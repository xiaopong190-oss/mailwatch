name: MailWatch Schedule Trigger

on:
  schedule:
    # 北京时间 8:32（避开整点高峰，GitHub 定时可能延迟）
    - cron: "32 8 * * *"
      timezone: Asia/Shanghai
  workflow_dispatch:

permissions:
  actions: write
  contents: read

concurrency:
  group: mailwatch-schedule-trigger
  cancel-in-progress: false

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Show trigger time
        run: date '+%Y-%m-%d %H:%M:%S %Z'

      - name: Dispatch daily report workflow
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'daily-report.yml',
              ref: 'main',
            });
            core.info('Dispatched daily-report.yml on main');
